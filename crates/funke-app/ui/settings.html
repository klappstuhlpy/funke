<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Funke Settings</title>
    <link rel="stylesheet" href="settings.css" />
    <link rel="stylesheet" href="keys.css" />
  </head>
  <body>
    <main id="window">
      <header id="titlebar" data-tauri-drag-region>
        <button id="close" data-i18n-title="settings.close" aria-label="Close">
          <svg viewBox="0 0 24 24"><path d="M7 7l10 10M17 7L7 17" /></svg>
        </button>
      </header>

      <div id="body">
        <nav id="sidebar">
          <div id="brand">
            <img src="icon.png" alt="Funke" width="24" height="24"/>
            <div>
              <div class="name">Funke</div>
              <div class="sub" data-i18n="settings.title"></div>
            </div>
          </div>

          <button class="nav active" data-pane="general">
            <svg viewBox="0 0 24 24"><path d="M4 7h16M4 12h16M4 17h10" /></svg>
            <span data-i18n="settings.nav.general"></span>
          </button>
          <button class="nav" data-pane="appearance">
            <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="8.5" /><path d="M12 3.5a8.5 8.5 0 0 1 0 17z" /></svg>
            <span data-i18n="settings.nav.appearance"></span>
          </button>
          <button class="nav" data-pane="hotkey">
            <svg viewBox="0 0 24 24"><rect x="3" y="7" width="18" height="11" rx="2.5" /><path d="M7.5 14.5h9" /></svg>
            <span data-i18n="settings.nav.hotkey"></span>
          </button>
          <button class="nav" data-pane="commands">
            <svg viewBox="0 0 24 24"><path d="M5 6.5l5 5.5-5 5.5" /><path d="M12.5 17.5H19" /></svg>
            <span data-i18n="settings.nav.commands"></span>
          </button>
          <button class="nav" data-pane="snippets">
            <svg viewBox="0 0 24 24"><path d="M6 3.5h7l5 5v12a1 1 0 0 1-1 1H6a1 1 0 0 1-1-1v-16a1 1 0 0 1 1-1z" /><path d="M13 3.5v5h5" /></svg>
            <span data-i18n="settings.nav.snippets"></span>
          </button>
          <button class="nav" data-pane="plugins">
            <svg viewBox="0 0 24 24"><path d="M9.5 4.5v3h5v-3a1.5 1.5 0 0 1 3 0v3H20a.8.8 0 0 1 .8.8v3.5a5.3 5.3 0 0 1-4.3 5.2v2.5a1.5 1.5 0 0 1-3 0" transform="rotate(45 12 12)" /></svg>
            <span data-i18n="settings.nav.plugins"></span>
          </button>
          <button class="nav" data-pane="about">
            <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="8.5" /><path d="M12 11v5.5" /><path d="M12 7.8v.01" /></svg>
            <span data-i18n="settings.nav.about"></span>
          </button>

          <div id="version">Funke</div>
        </nav>

        <section id="content">
          <div id="error" hidden></div>

          <div class="pane active" id="pane-general">
            <h1 data-i18n="settings.general.heading"></h1>
            <p class="lead" data-i18n="settings.general.lead"></p>

            <h2 class="section" data-i18n="settings.section.startup"></h2>
            <div class="card">
              <div class="row">
                <div class="what">
                  <div class="label" data-i18n="settings.autostart"></div>
                  <div class="desc" data-i18n="settings.autostart.desc"></div>
                </div>
                <button class="toggle" id="autostart" role="switch" aria-checked="false"></button>
              </div>
              <div class="row">
                <div class="what">
                  <div class="label" data-i18n="settings.language"></div>
                  <div class="desc" data-i18n="settings.language.desc"></div>
                </div>
                <select id="language"></select>
              </div>
            </div>

            <h2 class="section" data-i18n="settings.section.updates"></h2>
            <div class="card">
              <div class="row">
                <div class="what">
                  <div class="label" data-i18n="settings.updates"></div>
                  <div class="desc" id="update-status" data-i18n="settings.updates.desc"></div>
                </div>
                <button class="button" id="check-update" data-i18n="settings.updates.check"></button>
              </div>
            </div>
          </div>

          <div class="pane" id="pane-appearance">
            <h1 data-i18n="settings.appearance.heading"></h1>
            <p class="lead" data-i18n="settings.appearance.lead"></p>

            <h2 class="section" data-i18n="settings.section.overlay"></h2>
            <div class="card">
              <div class="row">
                <div class="what">
                  <div class="label" data-i18n="settings.accent"></div>
                  <div class="desc" data-i18n="settings.accent.desc"></div>
                </div>
                <div class="swatches" id="accents"></div>
              </div>
              <div class="row">
                <div class="what">
                  <div class="label" data-i18n="settings.width"></div>
                  <div class="desc" data-i18n="settings.width.desc"></div>
                </div>
                <div class="segmented" id="widths"></div>
              </div>
            </div>
          </div>

          <div class="pane" id="pane-hotkey">
            <h1 data-i18n="settings.nav.hotkey"></h1>
            <p class="lead" data-i18n="settings.hotkey.lead"></p>

            <h2 class="section" data-i18n="settings.section.summon"></h2>
            <div class="card">
              <div class="row">
                <div class="what">
                  <div class="label" data-i18n="settings.hotkey.label"></div>
                  <div class="desc" data-i18n="settings.hotkey.desc"></div>
                </div>
                <button id="recorder" class="recorder"></button>
              </div>
            </div>
            <p class="fineprint" data-i18n-html="settings.hotkey.fineprint"></p>

            <h2 class="section" data-i18n="settings.section.inside"></h2>
            <div class="card" id="shortcuts"></div>
          </div>

          <div class="pane" id="pane-commands">
            <h1 data-i18n="settings.commands.heading"></h1>
            <p class="lead" data-i18n="settings.commands.lead"></p>

            <h2 class="section" data-i18n="settings.section.providers"></h2>
            <div class="card" id="providers"></div>

            <h2 class="section" data-i18n="settings.section.web"></h2>
            <div class="card">
              <div class="row">
                <div class="what">
                  <div class="label" data-i18n="settings.engine"></div>
                  <div class="desc" data-i18n="settings.engine.desc"></div>
                </div>
                <select id="engine"></select>
              </div>
            </div>

            <h2 class="section" data-i18n="settings.section.files"></h2>
            <div class="card">
              <div class="row">
                <div class="what">
                  <div class="label" data-i18n="settings.roots"></div>
                  <div class="desc" data-i18n="settings.roots.desc"></div>
                </div>
                <button class="button" id="add-root" data-i18n="settings.roots.add"></button>
              </div>
              <div id="roots"></div>
              <div class="row" id="everything-row" hidden>
                <div class="what">
                  <div class="label">
                    <span data-i18n="settings.everything"></span>
                    <span class="tag" data-i18n="settings.everything.detected"></span>
                  </div>
                  <div class="desc" data-i18n-html="settings.everything.desc"></div>
                </div>
              </div>
            </div>

            <h2 class="section" data-i18n="settings.section.vault_unlock"></h2>
            <div class="card">
              <div class="row">
                <div class="what">
                  <div class="label" data-i18n="settings.vault.hello"></div>
                  <div class="desc" data-i18n="settings.vault.hello.desc"></div>
                </div>
                <button class="toggle" id="vault-hello" role="switch" aria-checked="false"></button>
              </div>
              <div class="row">
                <div class="what">
                  <div class="label" data-i18n="settings.vault.lock_screen"></div>
                  <div class="desc" data-i18n="settings.vault.lock_screen.desc"></div>
                </div>
                <button class="toggle" id="vault-lock-screen" role="switch" aria-checked="true"></button>
              </div>
              <div class="row">
                <div class="what">
                  <div class="label" data-i18n="settings.vault.idle"></div>
                  <div class="desc" data-i18n="settings.vault.idle.desc"></div>
                </div>
                <select id="vault-idle"></select>
              </div>
            </div>

            <h2 class="section" data-i18n="settings.section.vault_autotype"></h2>
            <div class="card">
              <div class="row">
                <div class="what">
                  <div class="label" data-i18n="settings.vault.guard"></div>
                  <div class="desc" data-i18n-html="settings.vault.guard.desc"></div>
                </div>
                <button class="toggle" id="vault-guard" role="switch" aria-checked="true"></button>
              </div>
              <div class="row">
                <div class="what">
                  <div class="label" data-i18n="settings.vault.autotype_enter"></div>
                  <div class="desc" data-i18n="settings.vault.autotype_enter.desc"></div>
                </div>
                <button class="toggle" id="vault-autotype-enter" role="switch" aria-checked="true"></button>
              </div>
              <div class="row">
                <div class="what">
                  <div class="label" data-i18n="settings.vault.sequence"></div>
                  <div class="desc" data-i18n-html="settings.vault.sequence.desc"></div>
                </div>
                <input
                  class="text-input"
                  id="vault-sequence"
                  type="text"
                  spellcheck="false"
                  placeholder="{USERNAME}{TAB}{PASSWORD}"
                />
              </div>
            </div>

            <h2 class="section" data-i18n="settings.section.vault_suggest"></h2>
            <div class="card">
              <div class="row">
                <div class="what">
                  <div class="label" data-i18n="settings.vault.context"></div>
                  <div class="desc" data-i18n-html="settings.vault.context.desc"></div>
                </div>
                <button class="toggle" id="vault-context" role="switch" aria-checked="true"></button>
              </div>
              <div class="row">
                <div class="what">
                  <div class="label" data-i18n="settings.vault.icons"></div>
                  <div class="desc" data-i18n="settings.vault.icons.desc"></div>
                </div>
                <button class="toggle" id="vault-icons" role="switch" aria-checked="true"></button>
              </div>
            </div>
          </div>

          <div class="pane" id="pane-snippets">
            <h1 data-i18n="settings.nav.snippets"></h1>
            <p class="lead" data-i18n-html="settings.snippets.lead"></p>

            <h2 class="section" data-i18n="settings.section.your_snippets"></h2>
            <div class="card">
              <div class="row">
                <div class="what">
                  <div class="label" data-i18n="settings.snippets.manage"></div>
                  <div class="desc" data-i18n="settings.snippets.manage.desc"></div>
                </div>
                <button class="button" id="add-snippet" data-i18n="settings.snippets.new"></button>
              </div>
            </div>

            <form class="card" id="snippet-editor" hidden>
              <div class="field">
                <label for="snippet-name" data-i18n="settings.snippets.name"></label>
                <input id="snippet-name" type="text" placeholder="Email signature" maxlength="80" required />
              </div>
              <div class="field">
                <label for="snippet-abbr">
                  <span data-i18n="settings.snippets.abbr"></span>
                  <span class="hint" data-i18n="settings.snippets.optional"></span>
                </label>
                <input id="snippet-abbr" type="text" placeholder="sig" maxlength="24" />
              </div>
              <div class="field">
                <label for="snippet-content" data-i18n="settings.snippets.content"></label>
                <textarea id="snippet-content" rows="6" placeholder="Viele Grüße&#10;Benedikt" required></textarea>
              </div>
              <div class="button-group">
                <button class="button primary" type="submit" id="snippet-save"></button>
                <button class="button" type="button" id="snippet-cancel" data-i18n="settings.snippets.cancel"></button>
              </div>
            </form>

            <div class="card" id="snippet-list" hidden></div>
            <div class="placeholder" id="snippets-empty">
              <div class="mark">◇</div>
              <p data-i18n-html="settings.snippets.empty"></p>
            </div>

            <h2 class="section" data-i18n="settings.section.placeholders"></h2>
            <div class="card">
              <div class="row">
                <div class="what">
                  <div class="label" data-i18n="settings.snippets.placeholders"></div>
                  <div class="desc" data-i18n-html="settings.snippets.placeholders.desc"></div>
                </div>
              </div>
            </div>
          </div>

          <div class="pane" id="pane-plugins">
            <h1 data-i18n="settings.nav.plugins"></h1>
            <p class="lead" data-i18n-html="settings.plugins.lead"></p>

            <h2 class="section" data-i18n="settings.section.installed"></h2>
            <div class="card">
              <div class="row">
                <div class="what">
                  <div class="label" data-i18n="settings.plugins.folder"></div>
                  <div class="desc" data-i18n="settings.plugins.folder.desc"></div>
                </div>
                <div class="button-group">
                  <button class="button" id="refresh-plugins" data-i18n="settings.plugins.refresh"></button>
                  <button class="button" id="open-plugins" data-i18n="settings.plugins.open"></button>
                </div>
              </div>
            </div>
            <div class="card" id="plugin-list" hidden></div>
            <div class="placeholder" id="plugins-empty">
              <div class="mark">◇</div>
              <p data-i18n-html="settings.plugins.empty"></p>
            </div>

            <h2 class="section" data-i18n="settings.section.catalog"></h2>
            <div class="card">
              <div class="row">
                <div class="what">
                  <div class="label" data-i18n="settings.plugins.suggested"></div>
                  <div class="desc" data-i18n="settings.plugins.suggested.desc"></div>
                </div>
                <div class="button-group">
                  <button class="button" id="browse-plugins" data-i18n="settings.plugins.browse"></button>
                </div>
              </div>
            </div>
            <div class="card" id="catalog-list" hidden></div>
          </div>

          <div class="pane" id="pane-about">
            <h1 data-i18n="settings.nav.about"></h1>
            <p class="lead" data-i18n="settings.about.lead"></p>

            <div class="card" id="about">
              <div class="row" id="about-identity">
                <img src="icon.png" alt="" width="44" height="44" />
                <div class="what">
                  <div class="label">
                    <span>Funke</span>
                    <span class="tag" id="about-version">—</span>
                  </div>
                  <div class="desc" data-i18n="settings.about.tagline"></div>
                </div>
              </div>
              <div class="row">
                <div class="what">
                  <div class="label" data-i18n="settings.about.built"></div>
                  <div class="desc" data-i18n="settings.about.built.desc"></div>
                </div>
              </div>
            </div>

            <h2 class="section" data-i18n="settings.section.links"></h2>
            <div class="card">
              <div class="links" id="links"></div>
            </div>

            <p class="fineprint" data-i18n="settings.about.fineprint"></p>
          </div>
        </section>
      </div>
    </main>
    <script src="i18n.js"></script>
    <script src="keys.js"></script>
    <script src="settings.js"></script>
  </body>
</html>
