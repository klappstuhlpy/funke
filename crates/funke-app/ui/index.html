<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Funke</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="keys.css" />
  </head>
  <body>
    <main id="panel">
      <input
        id="query"
        type="text"
        data-i18n-placeholder="overlay.placeholder"
        autocomplete="off"
        spellcheck="false"
      />
      <div id="context" data-i18n="overlay.recent" hidden></div>
      <ul id="results"></ul>
      <div id="pins" class="pins" hidden>
        <button id="pins-toggle" class="pins-toggle" data-i18n-title="overlay.pins.toggle">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round">
            <path d="M6 9l6 6 6-6"/>
          </svg>
        </button>
        <div id="pins-grid" class="pins-grid"></div>
      </div>
      <footer id="status" hidden>
        <span id="count"></span>
        <span class="keys">
          <span class="key-hint">
            <span data-keys="Up+Down"></span>
            <span data-i18n="overlay.keys.navigate"></span>
          </span>
          <span class="key-hint">
            <span data-keys="Enter"></span>
            <span data-i18n="overlay.keys.open"></span>
          </span>
          <span class="key-hint">
            <span data-keys="Tab"></span>
            <span data-i18n="overlay.keys.actions"></span>
          </span>
          <span class="key-hint">
            <span data-keys="Esc"></span>
            <span data-i18n="overlay.keys.dismiss"></span>
          </span>
        </span>
      </footer>
    </main>
    <!-- One per language, before i18n.js reads them. Adding a language adds a line here and
         the same line in settings.html — see docs/TRANSLATING.md. -->
    <script src="locales/en.js"></script>
    <script src="locales/de.js"></script>
    <script src="i18n.js"></script>
    <script src="keys.js"></script>
    <script src="main.js"></script>
  </body>
</html>
